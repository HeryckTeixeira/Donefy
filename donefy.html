<!DOCTYPE html>
<html lang="pt-br">
<style>
    body {
  font-family: Arial, sans-serif;
  color: rgb(255, 255, 255);
  background: #feffee;
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.container-principal {
  background: rgb(85, 128, 156);
  padding: 110px;
  border-radius: 900px;
  width: 900px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
}

.container-texto {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 8px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  padding: 10px;
  color: black;
  background: #eee;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  border-radius: 5px;
  gap: 10px;
}

li span {
  flex: 4;
  word-break: break-word;
}

li input[type="checkbox"] {
  transform: scale(1.3);
}

.completed {
  text-decoration: line-through;
  color: gray;
}
</style>
<head>
    <meta charset="UTF-8">
    <title>Donefy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-principal">
        <h1 id="ida">Donefy</h1>

        <div class="container-texto">
            <input type="text" id="campo-texto" placeholder="Type your task...">
            <button onclick="salvar()">Save</button>
        </div>

        <ul id="lista-tarefas"></ul>
    </div>
  
</body>
</html>
<script>
    function salvar() {
        const texto = document.getElementById("campo-texto").value
        const input = document.getElementById("campo-texto")

        if (texto === "") return

        const li = document.createElement("li")

        const span = document.createElement("span")
        span.textContent = texto

        const checkbox = document.createElement("input")
        checkbox.type = "checkbox"
        
        checkbox.onchange = function(){
            if(this.checked){
                span.classList.add("completed");
            } else {
                span.classList.remove("completed");
            }
        }

        li.appendChild(span)
        li.appendChild(checkbox)

        document.getElementById("lista-tarefas").appendChild(li)

        input.value = ""
    }

</script>
